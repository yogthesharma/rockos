[env]
CARGO_TERM_COLOR = "always"

[tasks.bootimage]
command = "cargo"
args = ["bootimage"]

[tasks.qemu]
dependencies = ["bootimage"]
command = "qemu-system-x86_64"
args = [
    "-drive", "format=raw,file=target/x86_64-unknown-none/debug/bootimage-rockos.bin",
    "-serial", "stdio",
    "-vga", "std",
    "-no-reboot",
    "-d", "int,guest_errors,cpu_reset",
]

[tasks.run]
run_task = { name = "qemu" }
